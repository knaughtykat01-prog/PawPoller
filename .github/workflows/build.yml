name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: python -m PyInstaller pawpoller.spec --noconfirm

      - name: Package release
        run: |
          cd dist
          Compress-Archive -Path PawPoller -DestinationPath PawPoller-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PawPoller-windows-x64
          path: dist/PawPoller-windows-x64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PawPoller-windows-x64.zip
          generate_release_notes: true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-server.txt

      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Syntax check
        run: python -m py_compile config.py server.py main.py dashboard.py
