name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: python -m PyInstaller pawpoller.spec --noconfirm

      - name: Package release
        run: |
          cd dist
          Compress-Archive -Path PawPoller -DestinationPath PawPoller-windows-x64.zip

      # Read APP_VERSION from config.py so the installer filename + the
      # Add/Remove Programs entry both carry the real version without
      # duplicating it in two places.
      - name: Read app version
        id: version
        shell: powershell
        run: |
          $line = Select-String -Path config.py -Pattern '^APP_VERSION\s*=\s*"([^"]+)"' | Select-Object -First 1
          if (-not $line) { throw 'APP_VERSION not found in config.py' }
          $version = $line.Matches[0].Groups[1].Value
          Write-Host "Detected version: $version"
          "version=$version" >> $env:GITHUB_OUTPUT

      # Inno Setup ships pre-installed on github's windows-latest runner
      # (under "C:\Program Files (x86)\Inno Setup 6\" — verified
      # 2026-05-20). Falls back to choco install if a future runner
      # image drops it.
      - name: Build installer
        shell: powershell
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup --no-progress -y
            $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          }
          & "$iscc" /DMyAppVersion="${{ steps.version.outputs.version }}" installer\PawPoller.iss
          if ($LASTEXITCODE -ne 0) { throw "iscc exited $LASTEXITCODE" }

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: PawPoller-windows-x64
          path: dist/PawPoller-windows-x64.zip

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: PawPoller-Setup
          path: installer/Output/PawPoller-Setup-*.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/PawPoller-windows-x64.zip
            installer/Output/PawPoller-Setup-*.exe
          generate_release_notes: true

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      # System deps:
      #   WeasyPrint runtime libs (libpango, libcairo, libgdk-pixbuf, …)
      #   libnotify-bin so notify-send is documented as a runtime expectation
      #   libgl1 / libegl1 / libxcb-* — Qt6 platform plugin runtime deps
      #   libxkbcommon-x11-0, libdbus-1-3 — Qt6 cross-platform input/notify
      #   libxcb-cursor0 — added in Qt6.5+, missing on stock ubuntu-22.04
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b libcairo2 \
            libgdk-pixbuf-2.0-0 libffi8 fonts-dejavu-core \
            libnotify-bin \
            libgl1 libegl1 libxkbcommon-x11-0 libdbus-1-3 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-sync1 libxcb-xfixes0 \
            libxcb-xkb1 libxcb-cursor0 \
            libnss3 libxcomposite1 libxdamage1 libxrandr2 libasound2

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: python -m PyInstaller pawpoller.spec --noconfirm

      - name: Read app version
        id: version
        run: |
          version=$(grep -E '^APP_VERSION\s*=\s*"' config.py | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [[ -z "$version" ]]; then echo "APP_VERSION not found in config.py" >&2; exit 1; fi
          echo "Detected version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build AppImage
        run: |
          chmod +x installer/build-appimage.sh
          installer/build-appimage.sh "${{ steps.version.outputs.version }}"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: PawPoller-AppImage
          path: installer/Output/PawPoller-*-x86_64.AppImage

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/PawPoller-*-x86_64.AppImage
          # generate_release_notes already produced by build-windows;
          # subsequent jobs uploading to the same release just add assets.

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-server.txt

      - name: Run tests
        # pytest (not unittest discover): two pytest-style modules
        # (test_integration_posting, test_platform_posters) get silently
        # skipped by unittest discovery. pytest picks up everything —
        # 91 tests vs unittest's 30.
        run: python -m pytest tests/ -v

      - name: Syntax check
        run: python -m py_compile config.py server.py main.py dashboard.py
