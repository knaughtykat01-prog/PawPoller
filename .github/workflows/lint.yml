name: Lint

on:
  pull_request:
  push:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linter
        run: pip install ruff

      - name: Ruff check
        run: ruff check --select E,F,W --ignore E501,E402,W503 .

  js-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check JS syntax
        run: |
          for f in frontend/js/*.js; do
            node -c "$f" || exit 1
          done
          echo "All JS files parse OK"
