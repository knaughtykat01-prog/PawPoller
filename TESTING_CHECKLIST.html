<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>PawPoller v2.14.2 — Testing Checklist</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            margin-bottom: 8px;
            color: #b8a0ff;
        }

        h2 {
            margin: 24px 0 12px;
            color: #9b7dff;
            border-bottom: 1px solid #333;
            padding-bottom: 6px;
        }

        .summary {
            margin-bottom: 20px;
            font-size: 14px;
            color: #999;
        }

        .summary span {
            font-weight: bold;
        }

        .summary .pass {
            color: #4a9;
        }

        .summary .fail {
            color: #e55;
        }

        .summary .untested {
            color: #888;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 16px;
            font-size: 13px;
        }

        th {
            background: #252545;
            text-align: left;
            padding: 8px 10px;
            border-bottom: 2px solid #444;
            position: sticky;
            top: 0;
        }

        td {
            padding: 6px 10px;
            border-bottom: 1px solid #2a2a3e;
            vertical-align: top;
        }

        tr:hover {
            background: #1e1e38;
        }

        tr.pass {
            background: rgba(70, 170, 100, 0.08);
        }

        tr.fail {
            background: rgba(230, 80, 80, 0.12);
        }

        .test-name {
            font-weight: 600;
            min-width: 140px;
        }

        .steps {
            color: #bbb;
            min-width: 200px;
        }

        .expected {
            color: #999;
            min-width: 200px;
            font-size: 12px;
        }

        .status-cell {
            text-align: center;
            white-space: nowrap;
        }

        .status-cell label {
            cursor: pointer;
            margin: 0 4px;
            font-size: 12px;
        }

        .status-cell input[type="radio"] {
            margin-right: 2px;
        }

        .result-input {
            width: 100%;
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 4px;
            color: #e0e0e0;
            padding: 4px 8px;
            font-size: 12px;
            font-family: inherit;
            resize: vertical;
            min-height: 28px;
        }

        .result-input:focus {
            border-color: #9b7dff;
            outline: none;
        }

        .num {
            color: #666;
            text-align: center;
            width: 30px;
        }

        .actions {
            margin: 16px 0;
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-primary {
            background: #9b7dff;
            color: white;
        }

        .btn-secondary {
            background: #333;
            color: #ccc;
        }

        .btn:hover {
            opacity: 0.85;
        }

        @media print {
            body {
                background: white;
                color: black;
            }

            td,
            th {
                border-color: #ccc;
            }

            .result-input {
                border-color: #ccc;
            }
        }
    </style>
</head>

<body>

    <h1>PawPoller v2.14.2 — Testing Checklist</h1>
    <div class="summary" id="summary">
        <span class="pass" id="pass-count">0</span> passed &nbsp;|&nbsp;

        <span class="untested" id="untested-count">128</span> untested &nbsp;|&nbsp;
        <span id="progress">0%</span> complete
    </div>
    <div class="actions">
        <button class="btn btn-primary" onclick="saveResults()">Save to localStorage</button>

        <button class="btn btn-secondary" onclick="exportCSV()">Export CSV</button>
        <button class="btn btn-secondary" onclick="document.getElementById('csv-import-input').click()">Import CSV</button>

        function render() {
            let html = '';
            for (const s of sections) {
                html += `<h2>${s.title}</h2><table>
        <tr><th style="width:30px">#</th><th style="width:150px">Test</th><th>Steps</th><th>Expected</th><th style="width:100px">Result</th><th style="width:220px">Notes / Actual Result</th></tr>`;
                for (const t of s.tests) {
                    html += `<tr id="row-${t.id}">
                <td class="num">${t.id}</td>
                <td class="test-name">${t.name}</td>
                <td class="steps">${t.steps}</td>
                <td class="expected">${t.expected}</td>
                <td class="status-cell">
                    <label><input type="radio" name="s${t.id}" value="pass" onchange="updateRow(${t.id})">✓</label>
                    <label><input type="radio" name="s${t.id}" value="fail" onchange="updateRow(${t.id})">✗</label>
                </td>
                <td><textarea class="result-input" id="note-${t.id}" placeholder="Write results here..." oninput="autoSave()"></textarea></td>
            </tr>`;
                }
                html += '</table>';
            }
            document.getElementById('content').innerHTML = html;
        }

        function updateRow(id) {
            const row = document.getElementById('row-' + id);
            const val = document.querySelector(`input[name="s${id}"]:checked`)?.value;
            row.className = val || '';
            updateSummary();
            autoSave();
        }

        function updateSummary() {
            let pass = 0, fail = 0, total = 128;
            for (let i = 1; i <= total; i++) {
                const v = document.querySelector(`input[name="s${i}"]:checked`)?.value;
                if (v === 'pass') pass++;
                else if (v === 'fail') fail++;
            }
            document.getElementById('pass-count').textContent = pass;
            document.getElementById('fail-count').textContent = fail;
            document.getElementById('untested-count').textContent = total - pass - fail;
            document.getElementById('progress').textContent = Math.round((pass + fail) / total * 100) + '%';
        }

        let _saveTimer;
        function autoSave() { clearTimeout(_saveTimer); _saveTimer = setTimeout(saveResults, 2000); }

        function saveResults() {
            const data = {};
            for (let i = 1; i <= 128; i++) {
                const v = document.querySelector(`input[name="s${i}"]:checked`)?.value || '';
                const n = document.getElementById('note-' + i)?.value || '';
                if (v || n) data[i] = { status: v, note: n };
            }
            localStorage.setItem('pawpoller_test_results', JSON.stringify(data));
        }

        function loadResults() {
            const raw = localStorage.getItem('pawpoller_test_results');
            if (!raw) return;
            const data = JSON.parse(raw);
            for (const [id, d] of Object.entries(data)) {
                if (d.status) {
                    const radio = document.querySelector(`input[name="s${id}"][value="${d.status}"]`);
                    if (radio) radio.checked = true;
                }
                if (d.note) {
                    const note = document.getElementById('note-' + id);
                    if (note) note.value = d.note;
                }
                updateRow(parseInt(id));
            }
            updateSummary();
        }

        function clearResults() {
            if (!confirm('Clear all test results?')) return;
            localStorage.removeItem('pawpoller_test_results');
            for (let i = 1; i <= 128; i++) {
                document.querySelectorAll(`input[name="s${i}"]`).forEach(r => r.checked = false);
                const n = document.getElementById('note-' + i);
                if (n) n.value = '';
                const row = document.getElementById('row-' + i);
                if (row) row.className = '';
            }
            updateSummary();
        }

        function exportCSV() {
            let csv = 'ID,Test,Status,Notes\n';
            for (const s of sections) {
                for (const t of s.tests) {
                    const v = document.querySelector(`input[name="s${t.id}"]:checked`)?.value || 'untested';
                    const n = (document.getElementById('note-' + t.id)?.value || '').replace(/"/g, '""');
                    csv += `${t.id},"${t.name}",${v},"${n}"\n`;
                }
            }
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'pawpoller_test_results.csv';
            a.click();
        }

        function parseCSVRow(line) {
            const out = [];
            let field = '', inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const c = line[i];
                if (inQuotes) {
                    if (c === '"' && line[i + 1] === '"') { field += '"'; i++; }
                    else if (c === '"') { inQuotes = false; }
                    else { field += c; }
                } else {
                    if (c === '"') { inQuotes = true; }
                    else if (c === ',') { out.push(field); field = ''; }
                    else { field += c; }
                }
            }
            out.push(field);
            return out;
        }

        function importCSV(event) {
            const file = event.target.files && event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                const text = String(reader.result).replace(/\r\n?/g, '\n');
                const lines = text.split('\n').filter(l => l.length);
                let applied = 0, skipped = 0;
                const start = lines[0].toLowerCase().startsWith('id,') ? 1 : 0;
                for (let i = start; i < lines.length; i++) {
                    const cols = parseCSVRow(lines[i]);
                    if (cols.length < 3) { skipped++; continue; }
                    const id = parseInt(cols[0], 10);
                    const status = (cols[2] || '').trim().toLowerCase();
                    const note = cols[3] || '';
                    if (!id || id < 1 || id > 128) { skipped++; continue; }
                    document.querySelectorAll(`input[name="s${id}"]`).forEach(r => r.checked = false);
                    if (status === 'pass' || status === 'fail') {
                        const radio = document.querySelector(`input[name="s${id}"][value="${status}"]`);
                        if (radio) radio.checked = true;
                    }
                    const noteEl = document.getElementById('note-' + id);
                    if (noteEl) noteEl.value = note;
                    updateRow(id);
                    applied++;
                }
                updateSummary();
                saveResults();
                event.target.value = '';
                alert(`Imported ${applied} row${applied === 1 ? '' : 's'}${skipped ? ` (${skipped} skipped)` : ''}.`);
            };
            reader.onerror = () => alert('Failed to read CSV file.');
            reader.readAsText(file);
        }
    </script>

    <div id="content"></div>
    <script>render(); loadResults();</script>

</body>

</html>
