<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>EPUB Viewer — PawPoller</title>
    <!-- Match the dashboard's no-flash theme bootstrap so the viewer
         opens in whatever theme the user has set rather than briefly
         flashing default-dark. The script body is byte-identical to
         index.html so the existing CSP sha256 hash for the inline
         theme bootstrap covers this file too — DO NOT EDIT. -->
    <script>
      (function () {
        var t = localStorage.getItem('pawpoller-theme') || 'dark';
        document.documentElement.dataset.theme = t;
        var m = localStorage.getItem('pawpoller-mobile-mode') || 'auto';
        var resolved;
        if (m === 'on') resolved = '1';
        else if (m === 'off') resolved = '0';
        else resolved = window.matchMedia('(max-width: 768px)').matches ? '1' : '0';
        document.documentElement.dataset.mobile = resolved;
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="/css/tokens.css?v=__APP_VERSION__">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-sans);
            overflow: hidden;
        }
        .viewer-bar {
            display: flex;
            align-items: center;
            gap: 0.6em;
            padding: 0.5em 0.9em;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            height: 48px;
            box-sizing: border-box;
        }
        .viewer-bar button,
        .viewer-bar a.btn {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.35em 0.75em;
            font: inherit;
            font-size: 0.85em;
            cursor: pointer;
            text-decoration: none;
            white-space: nowrap;
            transition: background var(--transition);
        }
        .viewer-bar button:hover,
        .viewer-bar a.btn:hover {
            background: var(--bg-hover);
        }
        .viewer-bar button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .viewer-title {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: var(--font-serif);
            font-size: 1.05em;
            color: var(--text-primary);
        }
        .viewer-location {
            font-size: 0.8em;
            color: var(--text-muted);
            min-width: 5em;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }
        #viewer-area {
            position: relative;
            width: 100%;
            height: calc(100% - 48px);
            background: var(--bg-primary);
        }
        #viewer {
            width: 100%;
            height: 100%;
        }
        .tap-zone {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 18%;
            z-index: 10;
            cursor: pointer;
        }
        .tap-zone.left  { left: 0; }
        .tap-zone.right { right: 0; }
        .viewer-status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--text-muted);
            font-size: 0.95em;
            text-align: center;
            max-width: 80%;
        }
        .viewer-status.error {
            color: var(--danger);
        }
        @media (max-width: 600px) {
            .viewer-title  { font-size: 0.95em; }
            .viewer-bar    { padding: 0.4em 0.6em; gap: 0.4em; }
            .viewer-bar a.dl-btn { display: none; }
        }
    </style>
</head>
<body>
    <div class="viewer-bar">
        <button id="btn-close" title="Close viewer">&times;</button>
        <span class="viewer-title" id="viewer-title">Loading&hellip;</span>
        <button id="btn-prev" title="Previous page (←)">&lsaquo;</button>
        <span class="viewer-location" id="viewer-location"></span>
        <button id="btn-next" title="Next page (→)">&rsaquo;</button>
        <a id="btn-download" class="btn dl-btn" download title="Download EPUB">&darr; EPUB</a>
    </div>
    <div id="viewer-area">
        <div class="tap-zone left"  id="tap-prev"></div>
        <div class="tap-zone right" id="tap-next"></div>
        <div id="viewer"></div>
        <div class="viewer-status" id="viewer-status">Loading EPUB&hellip;</div>
    </div>

    <script src="/vendor/jszip.min.js"></script>
    <script src="/vendor/epub.min.js"></script>
    <script src="/js/epub-viewer.js?v=__APP_VERSION__"></script>
</body>
</html>
