<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>EPUB Viewer — PawPoller</title>
    <!-- Match the dashboard's no-flash theme bootstrap so the viewer
         opens in whatever theme the user has set rather than briefly
         flashing default-dark. The script body is byte-identical to
         index.html so the existing CSP sha256 hash for the inline
         theme bootstrap covers this file too — DO NOT EDIT. -->
    <script>
      (function () {
        var t = localStorage.getItem('pawpoller-theme') || 'quill';
        document.documentElement.dataset.theme = t;
        var nv = localStorage.getItem('pawpoller-nav') || 'top';
        document.documentElement.dataset.navmode = nv;
        var dm = localStorage.getItem('pawpoller-mode') || 'default';
        if (dm !== 'default') document.documentElement.dataset.mode = dm;
        var m = localStorage.getItem('pawpoller-mobile-mode') || 'auto';
        var resolved;
        if (m === 'on') resolved = '1';
        else if (m === 'off') resolved = '0';
        else resolved = window.matchMedia('(max-width: 768px)').matches ? '1' : '0';
        document.documentElement.dataset.mobile = resolved;
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="/css/tokens.css?v=__APP_VERSION__">
    <style>
        :root {
            /* Reader-scoped variables; epub-viewer.js overrides these
               whenever the reader theme changes (auto/light/dark/sepia). */
            --reader-bg: var(--bg-primary);
            --reader-text: var(--text-primary);
            --reader-accent: var(--accent);
        }
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: var(--reader-bg);
            color: var(--reader-text);
            font-family: var(--font-sans);
            overflow: hidden;
        }
        .viewer-bar {
            display: flex;
            align-items: center;
            gap: 0.6em;
            padding: 0.5em 0.9em;
            background: var(--reader-bg);
            color: var(--reader-text);
            border-bottom: 1px solid var(--border);
            height: 48px;
            box-sizing: border-box;
            position: relative;
        }
        .viewer-bar button,
        .viewer-bar a.btn {
            background: transparent;
            color: var(--reader-text);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.35em 0.75em;
            font: inherit;
            font-size: 0.85em;
            cursor: pointer;
            text-decoration: none;
            white-space: nowrap;
            transition: background var(--transition);
        }
        .viewer-bar button:hover,
        .viewer-bar a.btn:hover {
            background: rgba(127, 127, 127, 0.15);
        }
        .viewer-title {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: var(--font-serif);
            font-size: 1.05em;
            color: var(--reader-text);
        }
        .viewer-location {
            font-size: 0.8em;
            opacity: 0.7;
            min-width: 5em;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }
        #viewer-area {
            position: relative;
            width: 100%;
            height: calc(100% - 48px);
            background: var(--reader-bg);
        }
        #viewer {
            width: 100%;
            height: 100%;
        }
        .tap-zone {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 18%;
            z-index: 10;
            cursor: pointer;
        }
        .tap-zone.left  { left: 0; }
        .tap-zone.right { right: 0; }
        .viewer-status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.7;
            font-size: 0.95em;
            text-align: center;
            max-width: 80%;
        }
        .viewer-status.error { color: var(--danger); }
        /* ── Aa dropdown ────────────────────────────── */
        #btn-aa {
            font-family: var(--font-serif);
            font-weight: 600;
            font-size: 1em;
            line-height: 1;
        }
        .aa-menu {
            position: absolute;
            top: 52px;
            right: 12px;
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 8px;
            display: none;
            z-index: 50;
            box-shadow: var(--shadow-strong, 0 8px 32px rgba(0,0,0,0.3));
            min-width: 220px;
        }
        .aa-menu.open { display: block; }
        .aa-row {
            display: flex;
            gap: 4px;
            margin-bottom: 6px;
        }
        .aa-row:last-child { margin-bottom: 0; }
        .aa-label {
            font-size: 0.75em;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin: 6px 2px 4px;
        }
        .aa-btn {
            flex: 1;
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 6px 8px;
            cursor: pointer;
            font: inherit;
            font-size: 0.85em;
            transition: background var(--transition);
        }
        .aa-btn:hover { background: var(--bg-hover); }
        .aa-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .aa-btn[data-size="S"]  { font-size: 0.7em; }
        .aa-btn[data-size="M"]  { font-size: 0.85em; }
        .aa-btn[data-size="L"]  { font-size: 1em; }
        .aa-btn[data-size="XL"] { font-size: 1.15em; }
        .aa-btn[data-theme-name="light"]  { background: #fafaf6; color: #1a1a1a; }
        .aa-btn[data-theme-name="dark"]   { background: #13111a; color: #f0edf5; }
        .aa-btn[data-theme-name="sepia"]  { background: #f4ecd8; color: #3a2e21; }
        .aa-btn[data-theme-name="auto"]   { background: transparent; }
        .aa-btn.active[data-theme-name]   { box-shadow: 0 0 0 2px var(--accent); }
        @media (max-width: 600px) {
            .viewer-title  { font-size: 0.95em; }
            .viewer-bar    { padding: 0.4em 0.6em; gap: 0.4em; }
            .viewer-bar a.dl-btn { display: none; }
            .aa-menu { right: 6px; min-width: 200px; }
        }
    </style>
</head>
<body>
    <div class="viewer-bar">
        <button id="btn-close" title="Close viewer">&times;</button>
        <span class="viewer-title" id="viewer-title">Loading&hellip;</span>
        <button id="btn-prev" title="Previous page (←)">&lsaquo;</button>
        <span class="viewer-location" id="viewer-location"></span>
        <button id="btn-next" title="Next page (→)">&rsaquo;</button>
        <button id="btn-aa" title="Appearance — text size and theme">Aa</button>
        <a id="btn-download" class="btn dl-btn" download title="Download EPUB">&darr; EPUB</a>
        <div class="aa-menu" id="aa-menu">
            <div class="aa-label">Text size</div>
            <div class="aa-row">
                <button class="aa-btn" data-size="S">S</button>
                <button class="aa-btn" data-size="M">M</button>
                <button class="aa-btn" data-size="L">L</button>
                <button class="aa-btn" data-size="XL">XL</button>
            </div>
            <div class="aa-label">Theme</div>
            <div class="aa-row">
                <button class="aa-btn" data-theme-name="auto">Auto</button>
                <button class="aa-btn" data-theme-name="light">Light</button>
                <button class="aa-btn" data-theme-name="dark">Dark</button>
                <button class="aa-btn" data-theme-name="sepia">Sepia</button>
            </div>
        </div>
    </div>
    <div id="viewer-area">
        <div class="tap-zone left"  id="tap-prev"></div>
        <div class="tap-zone right" id="tap-next"></div>
        <div id="viewer"></div>
        <div class="viewer-status" id="viewer-status">Loading EPUB&hellip;</div>
    </div>

    <script src="/vendor/jszip.min.js"></script>
    <script src="/vendor/epub.min.js"></script>
    <script src="/js/epub-viewer.js?v=__APP_VERSION__"></script>
</body>
</html>
